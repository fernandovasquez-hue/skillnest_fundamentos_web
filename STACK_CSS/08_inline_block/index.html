<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Fernando Vásquez">
    <title>Ejemplo mini-sitio inline-block</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <header class="header">
        <h1>Mi sitio Web</h1>
        <nav class="menu">
            <a href="#" class="boton">Inicio</a>
            <a href="#" class="boton">Servicios</a>
            <a href="#" class="boton">Contactos</a>
        </nav>
    </header>
    <main class="contenedor_principal">
        <!--Texto con elementos inline-->
        <section>
            <h2>Texto con elementos inline</h2>
            <p>Este es un ejemplo donde usamos <span class="resaltado">inline</span> para resaltar
                texto sin romper la línea de parrafo.
            </p>
        </section>
        <!--Tarjetas (inline-block)-->
        <section class="contenedor_tarjeta">
            <h2>Tarjetas (inline-block)</h2>
            <div class="box">Tarjeta 1</div>
            <div class="box">Tarjeta 2</div>
            <div class="box">Tarjeta 3</div>
        </section>
        <!--Bloques (block)-->
        <section>
            <h2>bloques (block)</h2>
            <div class="bloque">bloque 1</div>
            <div class="bloque">bloque 2</div>
            <div class="bloque">bloque 3</div>
        </section>
    </main>
    <!-- Footer -->
    <footer class="footer">
        <p>2026 - Todos los derechos reservados</p>
    </footer>
</body>
</html>
