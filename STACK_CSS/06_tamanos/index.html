<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Fernando Vásquez">
    <title>Modelo de caja CSS</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="enca">
        <h1 class="titulo1">Tamaños en CSS</h1>
    </header>
    <main class="container">
        <h2>Ejemplos:</h2>
        <section class="row"> <!--row. fila -->
            <h3 class="titulo">Ejemplo 1: botón</h3>
            <button class="aceptar">aceptar</button>
            <h3 class="titulo">Ejemplo 2: Caja con 80% de ancho</h3>
            <div class="caja1"></div>
            <h3 class="titulo">Ejemplo 3: Parrafo</h3>
            <p class="parra1">Parrafo de ejemplo</p>
            <h3 class="titulo">Ejemplo 4: Link</h3>
            <a class="link1" href="#">Click aquí</a>
        </section>
        <hr>
        <section class="row">
            <h3 class="titulo">Ejemplo 5: Usos de overflow</h3>
            <h2>Aplicando overflow</h2>
            <div class="caja hidden">
                <p>Ejemplo: hidden</p>
                <div class="example1"></div>
            </div>
            <div class="caja scroll">
                <p>Ejemplo: scroll</p>
                <div class="example2"></div>
            </div>
            <div class="caja auto">
                <p>Ejemplo: auto</p>
                <div class="example3"></div>
            </div>
        </section>
        <section class="row">
            <h2>Sin overflow</h2>
            <div class="caja">
                <div class="example1"></div>
            </div>
            <div class="caja">
                <div class="example2"></div>
            </div>
            <div class="caja">
                <div class="example3"></div>
            </div>
        </section>
        <section class="row">
            <h3 class="titulo">Ejemplo 6: fondos y colores</h3>
            <div class="banner"></div>
        </section>
    </main>
    <script src="static/js/script.js"></script>
</body>

</html>
