<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <!-- Creador de sitio web -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Fernando Vásquez">
    <title>Selectores avanzados</title>
    <!-- Link hacia hoja de estilos -->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="header">
        <img src="static/images/logo.png" alt="Logo">
        <h1 id="red" class="green">¡Hola, CSS!</h1>
    </header>
    <main>
        <div class="quote">
            <p>"Un gran poder conlleva una gran responsabilidad."</p>
            <h4>Tio Ben</h4>
        </div>
        <div id="container">
            <p class="highlight">Este es un párrafo resaltado dentro del contenedor.</p>
            <p>Este es otro párrafo dentro del contenedor.</p>
        </div>
        <form>
            <input type="text" name="username" placeholder="Escribe tu nombre">
            <input type="submit" value="Enviar">
        </form>
        <hr>
        <div>
            <h3>Colores en CSS</h3>
            <p class="color_nombre">Color por nombre</p>
            <p class="color_rgb">Color en formato RGB (Red, Green, Blue)</p>
            <p class="color_hex">Color en formato hexadecimal</p>
        </div>
    </main>
</body>

</html>
