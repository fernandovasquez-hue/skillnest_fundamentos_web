<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <!-- Creador de sitio web -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Fernando Vásquez">
    <title>Propiedades de texto</title>
    <!-- Link hacia hoja de estilos -->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header>
        <h1 class="titulo principal textoCentro subtitulo1 negrita">Propiedades de texto - CSS</h1>
    </header>
    <main class="container">
        <p class="textoIzquierda">Esto es un texto alineado hacia la izquierda</p>
        <h2 class="textoCentro tachado">Texto alineado al centro</h2>
        <h3 class="textoDerecha sinDecoracion">Texto alineado a la derecha</h3>
        <hr>
        <h2 class="textoIzquierda subtitulo1">Ejemplos decoración:</h2>
        <p>Ejemplo 1: <span class="tachado">Elemento tachado</span></p>
        <p>Ejemplo 2: Esto un <a href="#" class="sinDecoracion">link</a></p>
        <p>Ejemplo 3: <span class="subtitulo1"> Subrayado y cursiva</span></p>
        <p>Ejemplo 4:<span class="negrita">negrita</span></p>
        <p>Ejemplo 5:<span class="semiNegrita">Fuente más delgada</span></p>
    </main>
    <!--conexion con js-->
    <script src="static/js/script.js"></script>
</body>

</html>
