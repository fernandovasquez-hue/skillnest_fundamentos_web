<!DOCTYPE html>
<html lang="es">


<head><!--configuracion de la pagina-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
</head>


<body><!--cuerpo del documento-->
    <header><!--encabezado de la pagina-->
        <h1>Iniciar sesión</h1>
        <nav><!--barra de navegacion con enlaces-->
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">nosotros</a></li>
                <li><a href="#">contacto</a></li>
            </ul>
        </nav>
    </header>
    <main><!--seccion principal de la pagina-->
        <section>
            <article><!--articulo con infromacion especifica-->
                <h2> Hola soy un articulo!</h2>
                <hr>
                <p>Parrafo de un articulo</p>
            </article>
        </section>
        <section><!--contenedor al igual que un div-->
            <form action="/login" method="post">
                <div>
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div>
                    <input type="checkbox" id="recordarme" name="recordarme">
                    <label for="recordarme">Recordarme</label>
                </div>
                <button type="submit">Ingresar</button>
            </form>
        </section>
    </main>
    <footer style="text-align: center;">
        <p>todos los derechos reservados.</p>
    </footer>
</body>

</html>
